[tool.ruff]
line-length = 100
target-version = "py311"
 
[tool.ruff.lint]
# E/F = pyflakes+pycodestyle errors, I = import sorting, UP = pyupgrade,
# B = bugbear (catches common mistakes like mutable default args)
select = ["E", "F", "I", "UP", "B"]
ignore = [
    "E501",  # line too long - black already enforces this, avoid double warnings
]
 
[tool.ruff.lint.isort]
known-first-party = ["main"]
 
[tool.ruff.lint.per-file-ignores]
# tests/test_main.py needs sys.path.insert() BEFORE "import main" to make
# the module importable - this is intentional, not an import-order mistake
"tests/test_main.py" = ["E402", "I001"]
 
[tool.black]
line-length = 100
target-version = ["py311", "py312"]
 
[tool.mypy]
python_version = "3.11"
warn_return_any = false
warn_unused_configs = true
disallow_untyped_defs = true
ignore_missing_imports = true
exclude = ["venv", ".venv", "tests"]
 